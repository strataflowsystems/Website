<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <meta name="robots" content="noindex" />

  <body>
    <script>
      // Safety fallback for static hosts when rewrite rules are not applied.
      // Cloudflare Pages should use /_redirects, but this prevents hard 404 lockout.
      window.location.replace('/');
    </script>
  </body>
